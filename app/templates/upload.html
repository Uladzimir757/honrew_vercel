{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="max-w-2xl mx-auto bg-glass rounded-2xl shadow-lg p-8">
        <h1 class="text-3xl font-bold text-white mb-6 text-center">{{ tr.upload_page_title }}</h1>

        <form id="upload-form">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label for="what" class="block text-sm font-medium text-gray-300">{{ tr.form_what }}</label>
                    <input type="text" name="what" id="what" required class="mt-1 block w-full bg-slate-700/50 border-slate-600 rounded-md shadow-sm text-white focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="where" class="block text-sm font-medium text-gray-300">{{ tr.form_where }}</label>
                    <input type="text" name="where" id="where" required class="mt-1 block w-full bg-slate-700/50 border-slate-600 rounded-md shadow-sm text-white focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>
            <div class="mb-6">
                <label for="title" class="block text-sm font-medium text-gray-300">{{ tr.form_title }}</label>
                <input type="text" name="title" id="title" required class="mt-1 block w-full bg-slate-700/50 border-slate-600 rounded-md shadow-sm text-white focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div class="mb-6">
                <label for="description" class="block text-sm font-medium text-gray-300">{{ tr.form_description }}</label>
                <textarea name="description" id="description" rows="4" required class="mt-1 block w-full bg-slate-700/50 border-slate-600 rounded-md shadow-sm text-white focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label for="category" class="block text-sm font-medium text-gray-300">{{ tr.form_category }}</label>
                    <select name="category" id="category" required class="mt-1 block w-full bg-slate-700/50 border-slate-600 rounded-md shadow-sm text-white focus:ring-blue-500 focus:border-blue-500">
                        <option value="real-estate" {% if selected_category == 'real-estate' %}selected{% endif %}>{{ tr.nav_real_estate }}</option>
                        <option value="auto" {% if selected_category == 'auto' %}selected{% endif %}>{{ tr.nav_auto }}</option>
                        <option value="services" {% if selected_category == 'services' %}selected{% endif %}>{{ tr.nav_services }}</option>
                    </select>
                </div>
                <div>
                    <label for="rating" class="block text-sm font-medium text-gray-300">{{ tr.form_rating }}</label>
                    <select name="rating" id="rating" required class="mt-1 block w-full bg-slate-700/50 border-slate-600 rounded-md shadow-sm text-white focus:ring-blue-500 focus:border-blue-500">
                        <option value="5">★★★★★</option>
                        <option value="4">★★★★☆</option>
                        <option value="3">★★★☆☆</option>
                        <option value="2">★★☆☆☆</option>
                        <option value="1">★☆☆☆☆</option>
                    </select>
                </div>
            </div>

            <div class="mb-6">
                <label for="file-input" class="block text-sm font-medium text-gray-300">{{ tr.form_select_files }} ({{ tr.max_size }} 50MB)</label>
                <input type="file" name="files" id="file-input" multiple accept="video/*,image/*" class="mt-1 block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700">
            </div>

            <div id="file-list" class="mb-6 space-y-2"></div>

            <div id="progress-container" class="w-full bg-slate-700 rounded-full h-2.5 mb-4 hidden">
                <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
            </div>
            <div id="progress-text" class="text-center text-sm text-gray-400 mb-4"></div>

            <div id="error-message" class="hidden bg-red-900/50 text-red-300 p-3 rounded-md mb-6 text-center"></div>

            <button type="submit" id="submit-button" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-colors shadow-lg disabled:bg-slate-500">
                {{ tr.upload_button }}
            </button>
        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='js/upload-progress.js') }}"></script>
{% endblock %}
