{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md space-y-8">
        <div class="bg-slate-800/70 backdrop-blur-sm border border-slate-700 rounded-2xl shadow-lg p-8">
            <h2 class="text-center text-3xl font-bold tracking-tight text-white">{{ tr.forgot_password_title }}</h2>
            <p class="mt-2 text-center text-sm text-gray-400">{{ tr.forgot_password_instruction }}</p>
            <form class="mt-8 space-y-6" action="/forgot-password?lang={{ lang }}" method="POST">
                <div>
                    <input name="email" type="email" autocomplete="email" required
                        class="relative block w-full px-3 py-2 bg-white/10 text-white border border-slate-600 rounded-md placeholder-gray-400 focus:z-10 focus:border-blue-500 focus:outline-none focus:ring-blue-500 sm:text-sm"
                        placeholder="{{ tr.email_placeholder }}">
                </div>
                <div>
                    <button type="submit"
                        class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                        {{ tr.send_reset_link }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
