{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md space-y-8">
        <div class="bg-slate-800/70 backdrop-blur-sm border border-slate-700 rounded-2xl shadow-lg p-8">
            <h2 class="text-center text-3xl font-bold tracking-tight text-white">{{ tr.register_page_title }}</h2>
            <form class="mt-8 space-y-6" action="/register?lang={{ lang }}" method="POST">
                
                <div class="rounded-md">
                    <p class="block text-sm font-medium text-gray-300 mb-2">{{ tr.register_as }}</p>
                    <div class="flex items-center space-x-6 bg-slate-900/50 p-3 rounded-lg border border-slate-700">
                        <label class="flex items-center text-white cursor-pointer">
                            <input type="radio" name="user_type" value="client" class="h-4 w-4 text-blue-600 border-gray-500 focus:ring-blue-500" checked>
                            <span class="ml-2">{{ tr.user_type_client }}</span>
                        </label>
                        <label class="flex items-center text-white cursor-pointer">
                            <input type="radio" name="user_type" value="company" class="h-4 w-4 text-blue-600 border-gray-500 focus:ring-blue-500">
                            <span class="ml-2">{{ tr.user_type_company }}</span>
                        </label>
                    </div>
                </div>

                <div class="rounded-md shadow-sm -space-y-px">
                    <div>
                        <input name="email" type="email" autocomplete="email" required
                            class="relative block w-full px-3 py-2 bg-white/10 text-white border border-slate-600 rounded-t-md placeholder-gray-400 focus:z-10 focus:border-blue-500 focus:outline-none focus:ring-blue-500 sm:text-sm"
                            placeholder="{{ tr.email_placeholder }}">
                    </div>
                    <div class="relative">
                        <input name="password" type="password" id="password" required
                            class="relative block w-full px-3 py-2 bg-white/10 text-white border border-slate-600 placeholder-gray-400 focus:z-10 focus:border-blue-500 focus:outline-none focus:ring-blue-500 sm:text-sm"
                            placeholder="{{ tr.password_placeholder }}">
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center text-sm leading-5">
                            <svg data-target="password" class="w-6 h-6 text-gray-400 cursor-pointer password-toggle-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>                              
                        </div>
                    </div>
                    <div class="relative">
                        <input name="confirm_password" type="password" id="confirm_password" required
                            class="relative block w-full px-3 py-2 bg-white/10 text-white border border-slate-600 rounded-b-md placeholder-gray-400 focus:z-10 focus:border-blue-500 focus:outline-none focus:ring-blue-500 sm:text-sm"
                            placeholder="{{ tr.confirm_password_placeholder }}">
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center text-sm leading-5">
                            <svg data-target="confirm_password" class="w-6 h-6 text-gray-400 cursor-pointer password-toggle-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>                              
                        </div>
                    </div>
                </div>
                
                <div class="flex items-start">
                    <div class="flex items-center h-5">
                        <input id="consent" name="consent" type="checkbox" value="true" required class="h-4 w-4 text-blue-600 bg-gray-700 border-gray-600 rounded focus:ring-blue-600 ring-offset-gray-800 focus:ring-2">
                    </div>
                    <div class="ml-3 text-sm">
                        <label for="consent" class="font-medium text-gray-300">{{ tr.register_consent_label | safe }}</label>
                    </div>
                </div>
                
                <div>
                    <button type="submit"
                        class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                        {{ tr.register }}
                    </button>
                </div>
            </form>
            <div class="text-sm text-center mt-6">
                <a href="/login?lang={{ lang }}" class="font-medium text-blue-400 hover:text-blue-300">{{
                    tr.already_have_account }} {{ tr.login }}</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
