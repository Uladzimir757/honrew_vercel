{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <h1 class="text-4xl font-bold text-white mb-2">{{ tr.record_review_title }}</h1>
    <p class="text-lg text-gray-400 mb-8">{{ tr.record_review_subtitle }}</p>
    <div class="bg-glass rounded-lg shadow-lg p-6 md:p-8 max-w-3xl mx-auto">
        <div class="bg-black rounded-md overflow-hidden mb-4">
            <video id="video-preview" class="w-full h-auto" autoplay muted playsinline></video>
        </div>

        <div id="controls" class="flex flex-wrap items-center gap-4 mb-8">
            <button id="start-button" class="bg-green-600 text-white font-bold py-2 px-4 rounded hover:bg-green-700 transition">{{ tr.start_recording_button }}</button>
            <button id="stop-button" class="bg-red-600 text-white font-bold py-2 px-4 rounded hover:bg-red-700 transition hidden">{{ tr.stop_recording_button }}</button>
            <button id="switch-camera-button" class="bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition hidden">{{ tr.switch_camera_button }}</button>
            <p id="status" class="text-slate-300"></p>
        </div>
        <form id="upload-form" action="/upload?lang={{ lang }}" method="post" enctype="multipart/form-data" class="hidden upload-form">
            <h3 class="text-2xl font-semibold text-white mb-6">{{ tr.review_details_title }}</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="what" class="block text-slate-300 text-sm font-bold mb-2">{{ tr.upload_what_label }}</label>
                    <input type="text" id="what" name="what" class="w-full bg-slate-700/50 text-white rounded-md border-gray-600" required>
                </div>
                <div>
                    <label for="where" class="block text-slate-300 text-sm font-bold mb-2">{{ tr.upload_where_label }}</label>
                    <input type="text" id="where" name="where" class="w-full bg-slate-700/50 text-white rounded-md border-gray-600" required>
                </div>
            </div>

            <div class="mt-6">
                <label for="title" class="block text-slate-300 text-sm font-bold mb-2">{{ tr.upload_title_label }}</label>
                <input type="text" id="title" name="title" class="w-full bg-slate-700/50 text-white rounded-md border-gray-600" required>
            </div>

            <div class="mt-6">
                <label for="description" class="block text-slate-300 text-sm font-bold mb-2">{{ tr.upload_description_label }}</label>
                <textarea id="description" name="description" rows="4" class="w-full bg-slate-700/50 text-white rounded-md border-gray-600" required></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
                 <div>
                    <label for="category" class="block text-slate-300 text-sm font-bold mb-2">{{ tr.upload_category_label }}</label>
                    <select id="category" name="category" class="w-full bg-slate-700/50 text-white rounded-md border-gray-600" required>
                        <option value="real-estate">{{ tr.nav_real_estate }}</option>
                        <option value="auto">{{ tr.nav_auto }}</option>
                        <option value="services">{{ tr.nav_services }}</option>
                    </select>
                </div>
                <div>
                    <label for="rating" class="block text-slate-300 text-sm font-bold mb-2">{{ tr.upload_rating_label }}</label>
                     <div class="rating">
                        <input type="radio" id="star5" name="rating" value="5" required><label for="star5" title="5 stars"></label>
                        <input type="radio" id="star4" name="rating" value="4"><label for="star4" title="4 stars"></label>
                        <input type="radio" id="star3" name="rating" value="3"><label for="star3" title="3 stars"></label>
                        <input type="radio" id="star2" name="rating" value="2"><label for="star2" title="2 stars"></label>
                        <input type="radio" id="star1" name="rating" value="1"><label for="star1" title="1 star"></label>
                    </div>
                </div>
            </div>

            <div class="mt-8">
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded hover:bg-blue-700 transition text-lg">{{ tr.upload_button }}</button>
            </div>
        </form>
    </div>
</div>

<div id="upload-overlay" style="display: none;" class="fixed inset-0 bg-black bg-opacity-80 flex flex-col items-center justify-center z-50">
    <div class="spinner"></div>
    <p class="text-white text-lg mt-4">{{ tr.upload_spinner_text }}</p>
    </div>

<script src="{{ url_for('static', filename='js/recorder.js') }}"></script>
<script src="{{ url_for('static', filename='js/upload-progress.js') }}"></script>
{% endblock %}
