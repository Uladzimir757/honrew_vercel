{% extends "base.html" %}

{% block title %}{{ tr.contact_page_title }}{% endblock %}

{% block content %}
<div class="py-12 bg-slate-900 text-gray-300">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="bg-glass rounded-2xl shadow-lg p-8 md:p-12 text-center">
            <h1 class="text-4xl font-bold text-white mb-4">{{ tr.contact_page_title }}</h1>
            <p class="text-lg text-gray-400">{{ tr.contact_content }}</p>
            <a href="mailto:{{ settings.MAIL_FROM }}" class="text-xl text-blue-400 hover:text-blue-300 mt-2 inline-block">{{ settings.MAIL_FROM }}</a>
        </div>
    </div>
</div>
{% endblock %}
