{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="max-w-3xl mx-auto bg-glass rounded-2xl shadow-lg p-8">
        <h2 class="text-3xl font-bold text-white text-center mb-8">{{ tr.edit_page_title }}</h2>
        
        <form method="POST" action="{{ url_for('reviews.edit_review', review_id=review.id, lang=lang) }}" class="space-y-6">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="what" class="block text-sm font-medium text-gray-300">{{ tr.form_what }}</label>
                    <input type="text" name="what" id="what" value="{{ review.what }}" required class="mt-1 block w-full bg-slate-700/50 border-slate-600 rounded-md shadow-sm text-white focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="where" class="block text-sm font-medium text-gray-300">{{ tr.form_where }}</label>
                    <input type="text" name="where" id="where" value="{{ review.where }}" required class="mt-1 block w-full bg-slate-700/50 border-slate-600 rounded-md shadow-sm text-white focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>
            
            <div>
                <label for="title" class="block text-sm font-medium text-gray-300">{{ tr.form_title }}</label>
                <input type="text" name="title" id="title" value="{{ review.title }}" required class="mt-1 block w-full bg-slate-700/50 border-slate-600 rounded-md shadow-sm text-white focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-gray-300">{{ tr.form_description }}</label>
                <textarea id="description" name="description" rows="4" required class="mt-1 block w-full bg-slate-700/50 border-slate-600 rounded-md shadow-sm text-white focus:ring-blue-500 focus:border-blue-500">{{ review.description }}</textarea>
            </div>
            
            <div class="pt-4">
                <button type="submit"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 focus:ring-offset-gray-800">
                    {{ tr.save_changes }}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
