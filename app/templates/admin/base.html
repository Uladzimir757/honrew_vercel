<!DOCTYPE html>
<html lang="{{ lang }}" class="h-full bg-slate-900 text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Админ-панель{% endblock %} - HonestReviews</title>
    <link href="{{ url_for('static', filename='css/output.css') }}" rel="stylesheet">
</head>
<body class="h-full flex">

    <aside class="w-64 bg-slate-800 p-6 flex flex-col">
        <h2 class="text-2xl font-bold mb-8">Админ-панель</h2>
        <nav class="flex-grow">
            <ul class="space-y-2">
                <li><a href="{{ url_for('admin.manage_dashboard') }}" class="flex items-center space-x-3 p-2 rounded-md hover:bg-slate-700 transition"><span>แดชบอร์ด</span></a></li>
                <li><a href="{{ url_for('admin.manage_users') }}" class="flex items-center space-x-3 p-2 rounded-md hover:bg-slate-700 transition"><span>Пользователи</span></a></li>
                <li><a href="{{ url_for('admin.manage_reviews') }}" class="flex items-center space-x-3 p-2 rounded-md hover:bg-slate-700 transition"><span>Отзывы</span></a></li>
                <li><a href="{{ url_for('admin.manage_categories') }}" class="flex items-center space-x-3 p-2 rounded-md hover:bg-slate-700 transition"><span>Категории</span></a></li>
                <li><a href="{{ url_for('admin.manage_complaints') }}" class="flex items-center space-x-3 p-2 rounded-md hover:bg-slate-700 transition"><span>Жалобы</span></a></li>
                 <li><a href="{{ url_for('admin.manage_comments') }}" class="flex items-center space-x-3 p-2 rounded-md hover:bg-slate-700 transition"><span>Комментарии</span></a></li>
            </ul>
        </nav>
        <div class="mt-auto">
            <a href="{{ url_for('pages.home', lang=lang) }}" class="block text-center w-full p-2 rounded-md bg-slate-700 hover:bg-slate-600 transition">Вернуться на сайт</a>
        </div>
    </aside>

    <div class="flex-1 flex flex-col">
        <header class="bg-slate-800 shadow-md p-4 flex justify-between items-center">
            <h1 class="text-xl font-semibold">{% block header %}{% endblock %}</h1>
            <div>
                <span>{{ user.email }}</span>
            </div>
        </header>
        <main class="flex-1 p-8 overflow-y-auto">
            {% if flash %}
                <div class="p-4 mb-4 rounded-md {{ 'bg-green-600' if flash.category == 'success' else 'bg-red-600' }}">
                    <p class="text-white font-medium">{{ flash.message }}</p>
                </div>
            {% endif %}

            {% block content %}{% endblock %}
        </main>
    </div>

</body>
</html>
